<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="theme-color" content="#007bff">
    <meta name="description" content="Real-time camera capture and batch image watermarking">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%23007bff' width='192' height='192'/><text x='96' y='110' font-size='80' font-weight='bold' text-anchor='middle' fill='white'>💧</text></svg>">
    <title>Mobile Camera Watermark</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html, body {
            width: 100%;
            height: 100%;
            font-family: Arial, sans-serif;
            background: #000;
            overflow: hidden;
        }
        
        /* Force landscape 1920x1080 */
        body {
            width: 1920px;
            height: 1080px;
        }
        
        .container {
            display: flex;
            width: 100%;
            height: 100%;
            gap: 10px;
            padding: 10px;
        }

        .tab-buttons {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 20;
        }

        .tab-btn {
            padding: 10px 20px;
            background: #444;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }

        .tab-btn.active {
            background: #007bff;
        }

        .tab-content {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
        }

        .tab-content.active {
            display: flex;
        }

        /* Camera Tab */
        .video-container {
            width: 100%;
            height: 100%;
            background: #222;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        button {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 30px;
            font-size: 18px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            z-index: 10;
        }

        button:hover {
            background-color: #0056b3;
        }

        #status {
            position: absolute;
            top: 60px;
            left: 10px;
            color: #fff;
            background: rgba(0,0,0,0.7);
            padding: 10px;
            border-radius: 5px;
            font-size: 14px;
            z-index: 10;
        }

        .error {
            color: #ff6b6b;
        }

        .success {
            color: #51cf66;
        }

        /* Editor Tab */
        .editor-container {
            display: flex;
            width: 100%;
            height: 100%;
            gap: 15px;
            padding: 60px 15px 15px 15px;
            background: #1a1a1a;
            overflow: hidden;
        }

        .editor-left {
            width: 250px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow-y: auto;
            background: #222;
            padding: 15px;
            border-radius: 8px;
        }

        .editor-right {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #222;
            border-radius: 8px;
            padding: 15px;
            overflow: hidden;
        }

        .upload-section {
            margin-bottom: 10px;
        }

        .upload-area-editor {
            border: 2px dashed #007bff;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            background: rgba(0, 123, 255, 0.1);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .upload-area-editor:hover,
        .upload-area-editor.dragover {
            background: rgba(0, 123, 255, 0.3);
            border-color: #0056b3;
        }

        .upload-area-editor p {
            color: #fff;
            margin: 5px 0;
            font-size: 13px;
        }

        .tools-section {
            flex: 1;
            overflow-y: auto;
            background: #1a1a1a;
            padding: 10px;
            border-radius: 5px;
        }

        .tools-section h3 {
            font-size: 14px !important;
            margin-bottom: 10px !important;
        }

        .tools-section h4 {
            font-size: 12px !important;
        }

        .tool-group {
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid #444;
        }

        .tool-group:last-child {
            border-bottom: none;
        }

        .tool-btn {
            position: static !important;
            padding: 8px 12px !important;
            background: #404040 !important;
            color: white !important;
            border: 1px solid #555 !important;
            border-radius: 4px !important;
            cursor: pointer;
            font-size: 12px !important;
            transition: all 0.2s ease;
            transform: none !important;
        }

        .tool-btn:hover {
            background: #555 !important;
            border-color: #777 !important;
        }

        .tool-btn.action-btn {
            background: #007bff !important;
            border-color: #0056b3 !important;
        }

        .tool-btn.action-btn:hover {
            background: #0056b3 !important;
        }

        .tool-btn.reset-btn {
            background: #666 !important;
            border-color: #888 !important;
        }

        .tool-btn.reset-btn:hover {
            background: #777 !important;
        }

        .preview-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .preview-info {
            color: #aaa;
            font-size: 13px;
        }

        #editorCanvas {
            max-height: calc(100% - 40px);
            max-width: 100%;
            border: 1px solid #444;
            object-fit: contain;
        }

        /* Upload Tab */
        .upload-container {
            width: 100%;
            height: 100%;
            background: #1a1a1a;
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
        }

        .upload-area {
            border: 2px dashed #007bff;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            margin-bottom: 20px;
            background: rgba(0, 123, 255, 0.1);
            cursor: pointer;
            flex-shrink: 0;
        }

        .upload-area.dragover {
            background: rgba(0, 123, 255, 0.3);
            border-color: #0056b3;
        }

        .upload-area p {
            color: #fff;
            margin: 10px 0;
        }

        #fileInput {
            display: none;
        }

        .images-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
            flex: 1;
            overflow-y: auto;
        }

        .image-item {
            position: relative;
            background: #333;
            border-radius: 5px;
            overflow: hidden;
        }

        .image-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .image-status {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            font-size: 12px;
            padding: 5px;
            text-align: center;
        }

        .processing {
            color: #ffb700;
        }

        .done {
            color: #51cf66;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-shrink: 0;
        }

        .controls button {
            position: static !important;
            transform: none !important;
            padding: 12px 20px !important;
            font-size: 16px !important;
            flex: 1;
        }

        .progress-info {
            color: #fff;
            text-align: center;
            padding: 10px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 5px;
            margin-bottom: 10px;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }

        ::-webkit-scrollbar-thumb {
            background: #555;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #777;
        }
    </style>
</head>
<body>

    <div class="tab-buttons">
        <button class="tab-btn active" onclick="switchTab('camera')">📷 Camera</button>
        <button class="tab-btn" onclick="switchTab('editor')">✏️ Edit & Crop</button>
        <button class="tab-btn" onclick="switchTab('upload')">📁 Batch Upload</button>
    </div>

    <!-- Camera Tab -->
    <div id="camera" class="tab-content active">
        <div id="status" class="error">Initializing camera...</div>

        <div class="video-container">
            <video id="video" autoplay playsinline muted></video>
        </div>
        
        <button id="snap">Snap Photo (1920×1080)</button>
    </div>

    <!-- Edit & Crop Tab -->
    <div id="editor" class="tab-content">
        <div class="editor-container">
            <div class="editor-left">
                <div class="upload-section">
                    <div class="upload-area-editor" onclick="document.getElementById('editorFileInput').click()" id="editorUploadArea">
                        <p>📤 Click or drag image to edit</p>
                        <p style="font-size: 12px; color: #aaa;">PNG, JPG, JPEG</p>
                    </div>
                    <input type="file" id="editorFileInput" accept="image/png,image/jpeg,image/jpg" style="display: none;" />
                </div>

                <div class="tools-section" id="toolsSection" style="display: none;">
                    <h3 style="color: #fff; margin-bottom: 15px;">✏️ Edit Tools</h3>
                    
                    <div class="tool-group">
                        <label style="color: #fff; display: block; margin-bottom: 8px;">Rotation</label>
                        <div style="display: flex; gap: 5px;">
                            <button class="tool-btn" onclick="rotateImage(-90)">⟲ -90°</button>
                            <button class="tool-btn" onclick="rotateImage(90)">⟳ +90°</button>
                            <button class="tool-btn" onclick="rotateImage(180)">↻ 180°</button>
                        </div>
                    </div>

                    <div class="tool-group">
                        <label style="color: #fff; display: block; margin-bottom: 8px;">Flip</label>
                        <div style="display: flex; gap: 5px;">
                            <button class="tool-btn" onclick="flipImage('h')">↔️ Horizontal</button>
                            <button class="tool-btn" onclick="flipImage('v')">↕️ Vertical</button>
                        </div>
                    </div>

                    <div class="tool-group">
                        <label style="color: #fff; display: block; margin-bottom: 8px;">Brightness: <span id="brightnessValue">100</span>%</label>
                        <input type="range" id="brightness" min="0" max="200" value="100" oninput="updateFilters()" style="width: 100%; cursor: pointer;">
                    </div>

                    <div class="tool-group">
                        <label style="color: #fff; display: block; margin-bottom: 8px;">Contrast: <span id="contrastValue">100</span>%</label>
                        <input type="range" id="contrast" min="0" max="200" value="100" oninput="updateFilters()" style="width: 100%; cursor: pointer;">
                    </div>

                    <div class="tool-group">
                        <label style="color: #fff; display: block; margin-bottom: 8px;">Saturation: <span id="saturationValue">100</span>%</label>
                        <input type="range" id="saturation" min="0" max="200" value="100" oninput="updateFilters()" style="width: 100%; cursor: pointer;">
                    </div>

                    <div class="tool-group">
                        <h4 style="color: #fff; margin: 15px 0 10px;">🔲 Auto Crop to 1920×1080</h4>
                        <button class="tool-btn action-btn" onclick="autoCropTo1920x1080()" style="width: 100%;">Crop & Resize</button>
                    </div>

                    <div class="tool-group">
                        <label style="color: #fff; display: block; margin-bottom: 8px;">Custom Crop Ratio</label>
                        <div style="display: flex; gap: 5px; flex-wrap: wrap;">
                            <button class="tool-btn" onclick="setCropAspect(16/9)">16:9</button>
                            <button class="tool-btn" onclick="setCropAspect(4/3)">4:3</button>
                            <button class="tool-btn" onclick="setCropAspect(1)">1:1</button>
                        </div>
                    </div>

                    <div class="tool-group">
                        <button class="tool-btn reset-btn" onclick="resetImage()" style="width: 100%;">🔄 Reset</button>
                    </div>

                    <div style="display: flex; gap: 10px; margin-top: 20px;">
                        <button class="tool-btn" onclick="downloadEditedImage()" style="flex: 1; background: #51cf66;">💾 Save</button>
                        <button class="tool-btn reset-btn" onclick="clearEditor()" style="flex: 1;">✕ Clear</button>
                    </div>
                </div>
            </div>

            <div class="editor-right">
                <div class="preview-container">
                    <div class="preview-info">
                        <span id="previewDimensions" style="color: #aaa;">Upload an image to start</span>
                    </div>
                    <canvas id="editorCanvas" style="width: 100%; max-width: 100%; height: auto; border-radius: 5px;"></canvas>
                </div>
            </div>
        </div>
    </div>

    <!-- Batch Upload Tab -->
    <div id="upload" class="tab-content">
        <div class="upload-container">
            <div class="progress-info">Upload up to 500 images - Watermark applied automatically</div>
            
            <div class="upload-area" onclick="document.getElementById('fileInput').click()" id="uploadArea">
                <p>📤 Drag & drop images here or click to select</p>
                <p style="font-size: 12px; color: #aaa;">PNG, JPG, JPEG • Max 500 files</p>
            </div>

            <input type="file" id="fileInput" multiple accept="image/png,image/jpeg,image/jpg" />

            <div id="progressInfo" style="color: #fff; margin-bottom: 10px;"></div>
            <div class="images-grid" id="imagesGrid"></div>

            <div class="controls">
                <button onclick="downloadAllOriginals()" id="btnDownloadOrig">💾 Download Originals</button>
                <button onclick="downloadAllWatermarked()" id="btnDownloadWater">💧 Download Watermarked</button>
                <button onclick="clearAll()" id="btnClear">🗑️ Clear All</button>
            </div>
        </div>
    </div>
    
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        // ========== EDITOR STATE ==========
        let editorState = {
            originalImage: null,
            currentImage: null,
            rotation: 0,
            flipH: false,
            flipV: false,
            brightness: 100,
            contrast: 100,
            saturation: 100,
            cropAspect: null
        };

        // Tab switching
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tab).classList.add('active');
            event.target.classList.add('active');
            
            if (tab === 'camera') {
                video.play().catch(() => {});
            }
        }

        // ========== EDITOR FUNCTIONALITY ==========
        const editorFileInput = document.getElementById('editorFileInput');
        const editorCanvas = document.getElementById('editorCanvas');
        const editorCtx = editorCanvas.getContext('2d', { willReadFrequently: true });
        const editorUploadArea = document.getElementById('editorUploadArea');
        const toolsSection = document.getElementById('toolsSection');
        const previewDimensions = document.getElementById('previewDimensions');

        // Drag & drop for editor
        editorUploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            editorUploadArea.classList.add('dragover');
        });

        editorUploadArea.addEventListener('dragleave', () => {
            editorUploadArea.classList.remove('dragover');
        });

        editorUploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            editorUploadArea.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) {
                loadEditorImage(e.dataTransfer.files[0]);
            }
        });

        editorFileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                loadEditorImage(e.target.files[0]);
            }
        });

        function loadEditorImage(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    editorState.originalImage = img;
                    editorState.currentImage = img;
                    editorState.rotation = 0;
                    editorState.flipH = false;
                    editorState.flipV = false;
                    editorState.brightness = 100;
                    editorState.contrast = 100;
                    editorState.saturation = 100;
                    
                    // Reset sliders
                    document.getElementById('brightness').value = 100;
                    document.getElementById('contrast').value = 100;
                    document.getElementById('saturation').value = 100;
                    document.getElementById('brightnessValue').textContent = '100';
                    document.getElementById('contrastValue').textContent = '100';
                    document.getElementById('saturationValue').textContent = '100';
                    
                    toolsSection.style.display = 'flex';
                    editorUploadArea.style.opacity = '0.5';
                    drawEditorCanvas();
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function drawEditorCanvas() {
            const img = editorState.originalImage;
            if (!img) return;

            // Calculate display size (maintain aspect ratio, fit in canvas area)
            const maxWidth = 1000;
            const maxHeight = 900;
            let displayWidth = img.width;
            let displayHeight = img.height;

            if (displayWidth > maxWidth || displayHeight > maxHeight) {
                const ratio = Math.min(maxWidth / displayWidth, maxHeight / displayHeight);
                displayWidth *= ratio;
                displayHeight *= ratio;
            }

            editorCanvas.width = displayWidth;
            editorCanvas.height = displayHeight;

            editorCtx.save();

            // Apply transformations
            editorCtx.translate(displayWidth / 2, displayHeight / 2);
            editorCtx.rotate((editorState.rotation * Math.PI) / 180);
            if (editorState.flipH) editorCtx.scale(-1, 1);
            if (editorState.flipV) editorCtx.scale(1, -1);

            // Apply filters
            const brightness = editorState.brightness;
            const contrast = editorState.contrast;
            const saturation = editorState.saturation;

            editorCtx.filter = `brightness(${brightness}%) contrast(${contrast}%) saturate(${saturation}%)`;
            editorCtx.drawImage(img, -displayWidth / 2, -displayHeight / 2, displayWidth, displayHeight);

            editorCtx.restore();

            // Update dimensions display
            const actualWidth = Math.round(img.width);
            const actualHeight = Math.round(img.height);
            previewDimensions.textContent = `${actualWidth}×${actualHeight} | Aspect: ${(actualWidth / actualHeight).toFixed(2)}:1`;
        }

        function rotateImage(degrees) {
            editorState.rotation = (editorState.rotation + degrees) % 360;
            drawEditorCanvas();
        }

        function flipImage(direction) {
            if (direction === 'h') editorState.flipH = !editorState.flipH;
            if (direction === 'v') editorState.flipV = !editorState.flipV;
            drawEditorCanvas();
        }

        function updateFilters() {
            editorState.brightness = document.getElementById('brightness').value;
            editorState.contrast = document.getElementById('contrast').value;
            editorState.saturation = document.getElementById('saturation').value;

            document.getElementById('brightnessValue').textContent = editorState.brightness;
            document.getElementById('contrastValue').textContent = editorState.contrast;
            document.getElementById('saturationValue').textContent = editorState.saturation;

            drawEditorCanvas();
        }

        function setCropAspect(ratio) {
            editorState.cropAspect = ratio;
            // Visual feedback
            alert(`Crop aspect set to ${ratio.toFixed(2)}:1\n(Feature: Can implement manual crop tool)`);
        }

        function autoCropTo1920x1080() {
            if (!editorState.originalImage) {
                alert('Please load an image first');
                return;
            }

            const img = editorState.originalImage;
            const targetWidth = 1920;
            const targetHeight = 1080;
            const targetRatio = targetWidth / targetHeight;
            const imgRatio = img.width / img.height;

            let cropWidth, cropHeight, cropX, cropY;

            if (imgRatio > targetRatio) {
                // Image is wider than target
                cropHeight = img.height;
                cropWidth = img.height * targetRatio;
                cropX = (img.width - cropWidth) / 2;
                cropY = 0;
            } else {
                // Image is taller than target
                cropWidth = img.width;
                cropHeight = img.width / targetRatio;
                cropX = 0;
                cropY = (img.height - cropHeight) / 2;
            }

            // Create cropped and resized canvas
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = targetWidth;
            tempCanvas.height = targetHeight;
            const tempCtx = tempCanvas.getContext('2d');

            // Apply transformations before cropping
            tempCtx.translate(targetWidth / 2, targetHeight / 2);
            tempCtx.rotate((editorState.rotation * Math.PI) / 180);
            if (editorState.flipH) tempCtx.scale(-1, 1);
            if (editorState.flipV) tempCtx.scale(1, -1);

            tempCtx.filter = `brightness(${editorState.brightness}%) contrast(${editorState.contrast}%) saturate(${editorState.saturation}%)`;
            tempCtx.drawImage(
                img,
                cropX, cropY, cropWidth, cropHeight,
                -targetWidth / 2, -targetHeight / 2, targetWidth, targetHeight
            );

            tempCtx.restore();

            // Update display
            editorCanvas.width = 1920;
            editorCanvas.height = 1080;
            editorCtx.drawImage(tempCanvas, 0, 0);
            previewDimensions.textContent = '1920×1080 (Cropped & Resized)';

            // Store the result
            editorState.croppedCanvas = tempCanvas;
        }

        function resetImage() {
            if (!editorState.originalImage) return;

            editorState.rotation = 0;
            editorState.flipH = false;
            editorState.flipV = false;
            editorState.brightness = 100;
            editorState.contrast = 100;
            editorState.saturation = 100;
            editorState.croppedCanvas = null;

            document.getElementById('brightness').value = 100;
            document.getElementById('contrast').value = 100;
            document.getElementById('saturation').value = 100;
            document.getElementById('brightnessValue').textContent = '100';
            document.getElementById('contrastValue').textContent = '100';
            document.getElementById('saturationValue').textContent = '100';

            drawEditorCanvas();
        }

        function downloadEditedImage() {
            if (!editorCanvas.width || !editorCanvas.height) {
                alert('Please load and edit an image first');
                return;
            }

            editorCanvas.toBlob((blob) => {
                const link = document.createElement('a');
                const url = URL.createObjectURL(blob);
                link.href = url;
                link.download = `edited-${Date.now()}.jpg`;
                link.click();
                URL.revokeObjectURL(url);
            }, 'image/jpeg', 0.95);
        }

        function clearEditor() {
            editorState = {
                originalImage: null,
                currentImage: null,
                rotation: 0,
                flipH: false,
                flipV: false,
                brightness: 100,
                contrast: 100,
                saturation: 100,
                cropAspect: null
            };
            editorCanvas.width = 0;
            editorCanvas.height = 0;
            editorFileInput.value = '';
            toolsSection.style.display = 'none';
            editorUploadArea.style.opacity = '1';
            previewDimensions.textContent = 'Upload an image to start';
        }

        // ========== CAMERA FUNCTIONALITY ==========
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const statusDiv = document.getElementById('status');
        const snapBtn = document.getElementById('snap');

        // Set canvas to 1920x1080
        canvas.width = 1920;
        canvas.height = 1080;

        // Access rear camera
        navigator.mediaDevices.getUserMedia({ 
            video: { 
                facingMode: 'environment', 
                width: { ideal: 1920 }, 
                height: { ideal: 1080 } 
            },
            audio: false
        })
        .then(stream => {
            console.log('✓ Camera stream acquired');
            video.srcObject = stream;
            
            // Wait for video to load
            video.onloadedmetadata = () => {
                console.log(`✓ Video loaded: ${video.videoWidth}x${video.videoHeight}`);
                statusDiv.textContent = `Ready - ${video.videoWidth}x${video.videoHeight}`;
                statusDiv.className = 'success';
                snapBtn.disabled = false;
            };
        })
        .catch(error => {
            console.error('Camera error:', error);
            statusDiv.textContent = `Camera Error: ${error.message}`;
            statusDiv.className = 'error';
            snapBtn.disabled = true;
        });

        snapBtn.addEventListener('click', async () => {
            try {
                // Clear canvas
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, 1920, 1080);
                
                // Draw video frame
                ctx.drawImage(video, 0, 0, 1920, 1080);
                
                // Add Watermark text
                ctx.font = "60px Arial";
                ctx.fillStyle = "rgba(255, 255, 255, 0.7)";
                ctx.fillText("MY WATERMARK", 50, 1030);

                // Convert canvas to blob
                canvas.toBlob(async (blob) => {
                    const filename = `watermark-${Date.now()}.jpg`;
                    
                    // Try native share API (saves directly to mobile gallery)
                    if (navigator.share) {
                        try {
                            await navigator.share({
                                files: [new File([blob], filename, { type: 'image/jpeg' })],
                                title: 'Watermarked Photo'
                            });
                            console.log('✓ Photo shared to mobile gallery');
                            statusDiv.textContent = 'Photo saved to gallery!';
                            statusDiv.className = 'success';
                        } catch (err) {
                            console.log('Share cancelled or failed, using download');
                            downloadPhoto(blob, filename);
                        }
                    } else {
                        // Fallback: regular download
                        downloadPhoto(blob, filename);
                    }
                    
                    setTimeout(() => {
                        statusDiv.textContent = 'Ready - ' + (video.videoWidth || 1920) + 'x' + (video.videoHeight || 1080);
                    }, 2000);
                }, 'image/jpeg', 0.95);
            } catch (err) {
                console.error('Capture error:', err);
                statusDiv.textContent = `Error: ${err.message}`;
                statusDiv.className = 'error';
            }
        });

        function downloadPhoto(blob, filename) {
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            link.href = url;
            link.download = filename;
            link.click();
            URL.revokeObjectURL(url);
            console.log('✓ Photo downloaded');
            statusDiv.textContent = 'Photo saved!';
            statusDiv.className = 'success';
        }

        // ========== UPLOAD & BATCH WATERMARK FUNCTIONALITY ==========
        let uploadedImages = [];
        const MAX_FILES = 500;

        const fileInput = document.getElementById('fileInput');
        const uploadArea = document.getElementById('uploadArea');
        const imagesGrid = document.getElementById('imagesGrid');
        const progressInfo = document.getElementById('progressInfo');

        // Drag & drop
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });

        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
        });

        function handleFiles(files) {
            const newFiles = Array.from(files).slice(0, MAX_FILES - uploadedImages.length);
            
            progressInfo.textContent = `Processing ${newFiles.length} images...`;

            newFiles.forEach((file, index) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const imgData = {
                        name: file.name,
                        original: e.target.result,
                        watermarked: null,
                        status: 'processing'
                    };
                    uploadedImages.push(imgData);
                    applyWatermark(uploadedImages.length - 1);
                    renderImage(uploadedImages.length - 1);
                };
                reader.readAsDataURL(file);
            });

            updateProgress();
        }

        function applyWatermark(index) {
            const imgData = uploadedImages[index];
            const img = new Image();
            img.onload = () => {
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = img.width;
                tempCanvas.height = img.height;
                const tempCtx = tempCanvas.getContext('2d');

                // Draw original image
                tempCtx.drawImage(img, 0, 0);

                // Add watermark
                tempCtx.font = "60px Arial";
                tempCtx.fillStyle = "rgba(255, 255, 255, 0.7)";
                tempCtx.fillText("MY WATERMARK", 50, img.height - 30);

                // Save watermarked version
                imgData.watermarked = tempCanvas.toDataURL('image/jpeg', 0.95);
                imgData.status = 'done';
                renderImage(index);
                updateProgress();
            };
            img.src = imgData.original;
        }

        function renderImage(index) {
            const imgData = uploadedImages[index];
            let item = document.getElementById(`img-${index}`);

            if (!item) {
                item = document.createElement('div');
                item.id = `img-${index}`;
                item.className = 'image-item';
                imagesGrid.appendChild(item);
            }

            item.innerHTML = `
                <img src="${imgData.original}" alt="${imgData.name}">
                <div class="image-status ${imgData.status}">
                    ${imgData.status === 'processing' ? '⏳ Processing...' : '✓ Done'}
                </div>
            `;
        }

        function updateProgress() {
            const total = uploadedImages.length;
            const done = uploadedImages.filter(img => img.status === 'done').length;
            progressInfo.textContent = `Images: ${total}/${MAX_FILES} | Done: ${done}/${total}`;
        }

        function downloadAllOriginals() {
            if (uploadedImages.length === 0) {
                alert('No images uploaded');
                return;
            }
            uploadedImages.forEach((imgData, index) => {
                setTimeout(() => {
                    downloadImage(imgData.original, `original-${index}-${imgData.name}`);
                }, index * 200);
            });
        }

        function downloadAllWatermarked() {
            if (uploadedImages.length === 0) {
                alert('No images uploaded');
                return;
            }
            uploadedImages.forEach((imgData, index) => {
                setTimeout(() => {
                    downloadImage(imgData.watermarked, `watermarked-${index}-${imgData.name}`);
                }, index * 200);
            });
        }

        function downloadImage(dataUrl, filename) {
            const link = document.createElement('a');
            link.href = dataUrl;
            link.download = filename;
            link.click();
        }

        function clearAll() {
            if (confirm('Clear all images?')) {
                uploadedImages = [];
                imagesGrid.innerHTML = '';
                fileInput.value = '';
                progressInfo.textContent = '';
            }
        }

        // ========== PWA SERVICE WORKER REGISTRATION ==========
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/service-worker.js')
                .then((reg) => {
                    console.log('✓ Service Worker registered:', reg.scope);
                })
                .catch((err) => {
                    console.warn('Service Worker registration failed:', err);
                });
        }

        // Detect PWA installation
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            let deferredPrompt = e;
            console.log('✓ App installable - "Add to Home Screen" available');
        });

        window.addEventListener('appinstalled', () => {
            console.log('✓ PWA installed to home screen');
        });
    </script>
</body>
</html>
